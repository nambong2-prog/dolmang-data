name: Init History (최초 1회)

on:
  workflow_dispatch:
    inputs:
      days:
        description: '수집할 영업일수 (기본 7)'
        required: false
        default: '7'

jobs:
  init:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run init_history.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python init_history.py --days ${{ github.event.inputs.days }}

      - name: Commit trend.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trend.json
          git diff --cached --quiet || git commit -m "🗂️ init history: ${{ github.event.inputs.days }}일치 수집"
          git push
