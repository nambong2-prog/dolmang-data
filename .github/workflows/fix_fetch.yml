name: Fix fetch data

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Restore fetch_data.py
        run: |
          python3 - << PYEOF
import base64
data = ""
with open("fetch_data.py", "wb") as f:
    f.write(base64.b64decode(data))
import ast; ast.parse(open("fetch_data.py").read())
print("fetch_data.py 복원 완료")
PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add fetch_data.py
          git commit -m "fix: fetch_data.py 최신 버전으로 교체"
          git push
