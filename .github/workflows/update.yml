name: Dolmang Data Sync

on:
  schedule:
    - cron: '0 22 * * *'   # KST 07:00 (UTC 22:00, 전날)
    - cron: '0 1 * * *'    # KST 10:00 (UTC 01:00)
    - cron: '0 14 * * *'   # KST 23:00 (UTC 14:00)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # 전체내역(total_history)에는 이상값 제거 없이 '전건'을 그대로 담는다.
      # (정리/이상값 제거는 v2 화면에서 처리 → 전체내역은 원본 완전본 유지)
      - name: Patch total_history to keep raw rows
        run: |
          sed -i 's/"total_history": clean_rows/"total_history": list(rows)/' fetch_data.py
          grep -n '"total_history"' fetch_data.py

      - name: Run fetch script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python fetch_data.py

      - name: Commit scraper data
        run: |
          git config --global user.name "Dolmang Bot"
          git config --global user.email "bot@dolmang.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S') KST" > last_run.txt
          git add data.json trend.json last_run.txt
          git commit -m "Update auction data $(date +'%Y-%m-%d %H:%M')" || echo "no scraper changes"
          git pull --rebase --autostash origin main || true

      - name: Build and push v2-data (누적)
        run: |
          python build_v2data.py
          git add v2-data.json
          git commit -m "Accumulate v2-data $(date +'%Y-%m-%d %H:%M')" || echo "no v2-data changes"
          git push origin main || (git pull --rebase --autostash origin main && git push origin main)
