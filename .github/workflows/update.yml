name: Dolmang Data Sync

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python fetch_data.py

      - name: Commit and push data
        run: |
          git config --global user.name "Dolmang Bot"
          git config --global user.email "bot@dolmang.com"
          echo "$(date +'%Y-%m-%d %H:%M:%S') KST" > last_run.txt
          git add data.json trend.json last_run.txt
          git commit -m "Update auction data $(date +'%Y-%m-%d %H:%M')"
          git push
