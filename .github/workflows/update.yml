name: Dolmang Data Sync

on:
  schedule:
    - cron: '0 0,4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python fetch_data.py

      - name: Commit and push data
        run: |
          git config --global user.name "Dolmang Bot"
          git config --global user.email "bot@dolmang.com"
          git add data.json trend.json
          git commit -m "Update auction data" || echo "No changes"
          git push
